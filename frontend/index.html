<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Loan Payment Calculator</h1>
        <label>Loan Amount ($)</label>
        <input type="number" id="principal" placeholder="e.g. 10000">
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="e.g. 5.5">
        <label>Loan Term (months)</label>
        <input type="number" id="months" placeholder="e.g. 60">
        <button onclick="calculate()">Calculate</button>
        <div id="results" class="results hidden">
            <h2>Results</h2>
            <p>Monthly Payment: <span id="monthly"></span></p>
            <p>Total Payment: <span id="total"></span></p>
            <p>Total Interest: <span id="interest"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
